<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量图片下载器</title>
    <meta name="description" content="批量下载图片到本地，支持多个URL同时下载">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5);
        }

        .btn-gradient:active {
            transform: translateY(0);
        }

        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .textarea-custom {
            transition: all 0.3s ease;
        }

        .textarea-custom:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .tab-active {
            border-bottom: 3px solid #667eea;
            color: #667eea;
        }
    </style>
</head>

<body class="min-h-screen gradient-bg flex items-center justify-center p-4">

    <div class="w-full max-w-3xl glass-card rounded-3xl p-6 md:p-8">
        <!-- 标题 -->
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">📥 批量图片下载器</h1>
            <p class="text-gray-500 text-sm md:text-base">输入图片链接，一行一个，快速下载到本地</p>
        </div>

        <!-- 统计卡片 -->
        <div id="statsArea" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-blue-600" id="statTotal">0</div>
                <div class="text-xs text-blue-500">总下载</div>
            </div>
            <div class="bg-gradient-to-br from-green-50 to-green-100 rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-green-600" id="statSuccess">0</div>
                <div class="text-xs text-green-500">成功</div>
            </div>
            <div class="bg-gradient-to-br from-red-50 to-red-100 rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-red-600" id="statFailed">0</div>
                <div class="text-xs text-red-500">失败</div>
            </div>
            <div class="bg-gradient-to-br from-purple-50 to-purple-100 rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-purple-600" id="statToday">0</div>
                <div class="text-xs text-purple-500">今日</div>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="flex border-b mb-6">
            <button onclick="switchTab('download')" id="tabDownload"
                class="tab-active px-4 py-2 font-medium text-gray-600 hover:text-purple-600 transition">下载</button>
            <button onclick="switchTab('history')" id="tabHistory"
                class="px-4 py-2 font-medium text-gray-600 hover:text-purple-600 transition">历史记录</button>
        </div>

        <!-- 下载区域 -->
        <div id="downloadPanel">
            <div class="relative mb-6">
                <textarea id="urlInput"
                    class="textarea-custom w-full h-48 md:h-56 p-4 border-2 border-gray-200 rounded-2xl resize-none focus:outline-none focus:border-purple-400 text-gray-700 text-sm md:text-base"
                    placeholder="请输入图片链接，每行一个&#10;&#10;例如：&#10;https://example.com/image1.jpg&#10;https://example.com/image2.png"></textarea>
                <div class="absolute bottom-4 right-4">
                    <button id="downloadBtn"
                        class="btn-gradient px-6 py-3 text-white font-semibold rounded-xl flex items-center gap-2"
                        onclick="startDownload()">
                        <span id="btnText">开始下载</span>
                        <svg id="btnSpinner" class="hidden spinner w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="progressArea" class="hidden fade-in">
                <div class="bg-gray-100 rounded-full h-4 mb-4 overflow-hidden">
                    <div id="progressBar"
                        class="progress-bar h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full"
                        style="width: 0%"></div>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600">进度：</span>
                        <span id="progressText" class="font-bold text-purple-600">0 / 0</span>
                    </div>
                    <div id="statusText" class="text-sm text-gray-500">准备中...</div>
                </div>
                <div id="resultList" class="max-h-40 overflow-y-auto space-y-2 text-sm"></div>
            </div>
        </div>

        <!-- 历史记录区域 -->
        <div id="historyPanel" class="hidden">
            <div id="historyList" class="space-y-2 max-h-96 overflow-y-auto"></div>
            <div id="pagination" class="flex justify-center gap-2 mt-4"></div>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        const API_URL = '/api/imgdow.php';
        let isDownloading = false;
        let currentPage = 1;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => { loadStats(); });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `toast ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function setButtonLoading(loading) {
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            btn.disabled = loading;
            btnText.textContent = loading ? '下载中...' : '开始下载';
            btnSpinner.classList.toggle('hidden', !loading);
        }

        function updateProgress(downloaded, total, status) {
            const percent = total > 0 ? (downloaded / total) * 100 : 0;
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = `${downloaded} / ${total}`;
            document.getElementById('statusText').textContent = status;
        }

        function addResult(url, success, message) {
            const resultList = document.getElementById('resultList');
            const item = document.createElement('div');
            const shortUrl = url.length > 50 ? url.substring(0, 47) + '...' : url;
            item.className = `flex items-center gap-2 p-2 rounded-lg ${success ? 'bg-green-50' : 'bg-red-50'}`;
            item.innerHTML = `<span class="${success ? 'text-green-500' : 'text-red-500'}">${success ? '✓' : '✗'}</span><span class="text-gray-600 truncate flex-1" title="${url}">${shortUrl}</span><span class="text-xs ${success ? 'text-green-600' : 'text-red-600'}">${message}</span>`;
            resultList.insertBefore(item, resultList.firstChild);
        }

        async function startDownload() {
            if (isDownloading) return;
            const urlInput = document.getElementById('urlInput');
            const progressArea = document.getElementById('progressArea');
            const resultList = document.getElementById('resultList');
            const urls = urlInput.value.split('\n').map(url => url.trim()).filter(url => url.length > 0);
            if (urls.length === 0) { showToast('请输入至少一个图片链接', 'error'); return; }

            isDownloading = true;
            setButtonLoading(true);
            progressArea.classList.remove('hidden');
            resultList.innerHTML = '';
            let downloaded = 0, failed = 0;
            const total = urls.length;
            updateProgress(0, total, '开始下载...');

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                updateProgress(downloaded + failed, total, `正在下载: ${i + 1}/${total}`);
                try {
                    const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: url }) });
                    const result = await response.json();
                    if (result.success) { downloaded++; addResult(url, true, `已保存: ${result.savedAs}`); }
                    else { failed++; addResult(url, false, result.error || '下载失败'); }
                } catch (error) { failed++; addResult(url, false, '网络错误'); }
                updateProgress(downloaded + failed, total, `已完成: ${downloaded + failed}/${total}`);
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            isDownloading = false;
            setButtonLoading(false);
            updateProgress(total, total, `完成！成功: ${downloaded}, 失败: ${failed}`);
            loadStats();
            if (failed === 0) showToast(`全部下载成功！共 ${downloaded} 张图片`, 'success');
            else if (downloaded === 0) showToast('所有图片下载失败，请检查链接', 'error');
            else showToast(`下载完成：成功 ${downloaded} 张，失败 ${failed} 张`, 'info');
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}?action=stats`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('statTotal').textContent = data.stats.total;
                    document.getElementById('statSuccess').textContent = data.stats.success;
                    document.getElementById('statFailed').textContent = data.stats.failed;
                    document.getElementById('statToday').textContent = data.stats.today;
                }
            } catch (e) { console.error('加载统计失败', e); }
        }

        async function loadHistory(page = 1) {
            currentPage = page;
            try {
                const response = await fetch(`${API_URL}?action=history&page=${page}&limit=10`);
                const data = await response.json();
                if (data.success) {
                    const historyList = document.getElementById('historyList');
                    historyList.innerHTML = data.data.length === 0 ? '<div class="text-center text-gray-400 py-8">暂无下载记录</div>' : data.data.map(item => `
                        <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
                            <span class="${item.status === 'success' ? 'text-green-500' : 'text-red-500'} text-lg">${item.status === 'success' ? '✓' : '✗'}</span>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm text-gray-700 truncate" title="${item.url}">${item.url}</div>
                                <div class="text-xs text-gray-400">${item.directory}/${item.filename} · ${new Date(item.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                    `).join('');
                    
                    const pagination = document.getElementById('pagination');
                    const { totalPages } = data.pagination;
                    pagination.innerHTML = totalPages <= 1 ? '' : Array.from({length: totalPages}, (_, i) => i + 1).map(p => `<button onclick="loadHistory(${p})" class="px-3 py-1 rounded ${p === page ? 'bg-purple-500 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}">${p}</button>`).join('');
                }
            } catch (e) { console.error('加载历史失败', e); }
        }

        function switchTab(tab) {
            document.getElementById('tabDownload').classList.toggle('tab-active', tab === 'download');
            document.getElementById('tabHistory').classList.toggle('tab-active', tab === 'history');
            document.getElementById('downloadPanel').classList.toggle('hidden', tab !== 'download');
            document.getElementById('historyPanel').classList.toggle('hidden', tab !== 'history');
            if (tab === 'history') loadHistory();
        }

        document.getElementById('urlInput').addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') startDownload(); });
    </script>
</body>

</html>
